[platformio]
default_envs = pico2
src_dir = examples/00B_Hardware_Setup

[env]
framework = arduino
lib_deps = lovyan03/LovyanGFX
lib_extra_dirs = .
monitor_speed = 115200
extra_scripts = pre:scripts/package_sdk.py

[env:pico2]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
board_build.core = earlephilhower

; ESP32 builds can use the same selected example when its hardware
; configuration is changed to ESP32-compatible pins.
[env:esp32dev]
platform = espressif32
board = esp32dev
